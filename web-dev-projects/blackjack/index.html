<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanila Black Jack</title>
    <link rel='stylesheet' href='./style.css' />

</head>

<body>
    <div id='cont' class="container">
        <h1>Welcome to BlackJack!</h1>

        <h2>Dealer's Hand: <span id='dealerHandValue'></span> </h2>
        <div id='brd' class="board">
            
        </div>

        <h1>Your Hand: <span id='handValue'></span></h1>
        <div id='hnd' class="hand">
          
        </div>
        <div class="choices">
            <button type='button' id='hitMe'>Hit Me!</button>
            <button type='button' id='standMe'>Stand</button>
            <button type='button' id='betMe'>Bet</button>
        </div>
    </div>

    <div class='gameover'>
        <h3 id='whoWinsCaption'></h3>
        <button type='button' id='playAgainBtn'>Play Again?</button>
    </div>

    <div class='startscene'>
        <h1>Welcome to Vanila BlackJack!!</h1>
        <h4>By Adrian</h4>
        <button id='startBtn'>Play!</button>
    </div>

    <script src='./main.js'></script>
</body>
